<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HealthFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink: #FF6B9D;
            --pink-light: #FFB8D0;
            --orange: #FF9F43;
            --orange-light: #FFD4A3;
            --yellow: #FFD93D;
            --yellow-light: #FFED9E;
            --green: #6BCB77;
            --green-light: #B4E9BC;
            --blue: #4D96FF;
            --blue-light: #A8D4FF;
            --purple: #9B59B6;
            --purple-light: #D5A6E6;
            --cyan: #00D9FF;
            --bg: #FEF9F3;
            --card: #FFFFFF;
            --text: #2D3436;
            --text-light: #636E72;
        }

        body {
            font-family: 'Quicksand', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
        }

        /* 顶部 */
        .header {
            background: linear-gradient(135deg, var(--pink) 0%, var(--orange) 100%);
            border-radius: 0 0 32px 32px;
            padding: 48px 20px 32px;
            color: white;
            box-shadow: 0 8px 32px rgba(255, 107, 157, 0.3);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .date-badge {
            background: rgba(255,255,255,0.25);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .greeting {
            font-size: 15px;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .user-name {
            font-size: 24px;
            font-weight: 700;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: -24px 16px 24px;
            position: relative;
            z-index: 10;
        }

        .stat-card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-icon.water { background: linear-gradient(135deg, #E3F2FD, #BBDEFB); }
        .stat-icon.pee { background: linear-gradient(135deg, #E0F7FA, #B2EBF2); }
        .stat-icon.poop { background: linear-gradient(135deg, #FFF3E0, #FFE0B2); }
        .stat-icon.sleep { background: linear-gradient(135deg, #F3E5F5, #E1BEE7); }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            font-weight: 600;
        }

        /* 区块标题 */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 32px 20px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* 快速操作 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 0 16px;
        }

        .action-btn {
            background: var(--card);
            border: none;
            border-radius: 24px;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .action-btn.water::before { background: var(--blue); }
        .action-btn.pee::before { background: var(--cyan); }
        .action-btn.poop::before { background: var(--orange); }
        .action-btn.meal::before { background: var(--green); }
        .action-btn.sport::before { background: var(--pink); }
        .action-btn.sleep::before { background: var(--purple); }

        .action-icon {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .action-btn.water .action-icon { background: linear-gradient(135deg, var(--blue-light), #E3F2FD); }
        .action-btn.pee .action-icon { background: linear-gradient(135deg, #E0F7FA, #B2EBF2); }
        .action-btn.poop .action-icon { background: linear-gradient(135deg, var(--orange-light), #FFF3E0); }
        .action-btn.meal .action-icon { background: linear-gradient(135deg, var(--green-light), #E8F5E9); }
        .action-btn.sport .action-icon { background: linear-gradient(135deg, var(--pink-light), #FCE4EC); }
        .action-btn.sleep .action-icon { background: linear-gradient(135deg, var(--purple-light), #F3E5F5); }

        .action-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        /* 今日记录 */
        .logs-container {
            margin: 0 16px;
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .log-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid #F5F5F5;
        }

        .log-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .log-item:first-child {
            padding-top: 0;
        }

        .log-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .log-content {
            flex: 1;
        }

        .log-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 2px;
        }

        .log-time {
            font-size: 12px;
            color: var(--text-light);
        }

        .log-value {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* 底部导航 */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            border-radius: 32px 32px 0 0;
            padding: 16px 24px 28px;
            box-shadow: 0 -4px 30px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: transparent;
            font-family: inherit;
        }

        .nav-item.active {
            background: linear-gradient(135deg, var(--pink-light), #FFE0EC);
        }

        .nav-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-light);
        }

        .nav-item.active .nav-label {
            color: var(--pink);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 200;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border-radius: 32px 32px 0 0;
            padding: 24px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .modal-icon {
            width: 72px;
            height: 72px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 16px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
        }

        .modal-subtitle {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* 星级评分 */
        .star-rating {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 24px 0;
        }

        .star-btn {
            width: 48px;
            height: 48px;
            border: none;
            background: #F5F5F5;
            border-radius: 16px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .star-btn.active {
            background: linear-gradient(135deg, var(--yellow), var(--orange));
            transform: scale(1.1);
        }

        /* 输入框 */
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 8px;
            display: block;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #F0F0F0;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
            background: #FAFAFA;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--pink);
            background: white;
        }

        textarea.input-field {
            resize: none;
            min-height: 100px;
        }

        /* 按钮 */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #F5F5F5;
            color: var(--text);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--pink), var(--orange));
            color: white;
            box-shadow: 0 4px 16px rgba(255, 107, 157, 0.4);
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--text);
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            z-index: 300;
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 餐食选择 */
        .meal-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .meal-option {
            padding: 20px;
            border: 2px solid #F0F0F0;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .meal-option.selected {
            border-color: var(--green);
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
        }

        .meal-option-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .meal-option-label {
            font-size: 13px;
            font-weight: 600;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- 顶部 -->
    <header class="header">
        <div class="header-top">
            <div class="logo">HealthFlow</div>
            <div class="date-badge" id="current-date">--月--日</div>
        </div>
        <div class="greeting">今天也要元气满满哦 ✨</div>
        <div class="user-name">健康打卡</div>
    </header>

    <!-- 统计卡片 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon water">💧</div>
            <div class="stat-value" id="water-count">0</div>
            <div class="stat-label">杯水</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon pee">🚽</div>
            <div class="stat-value" id="pee-count">0</div>
            <div class="stat-label">次排尿</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon poop">💩</div>
            <div class="stat-value" id="poop-count">0</div>
            <div class="stat-label">次排便</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon sleep">😴</div>
            <div class="stat-value" id="sleep-info" style="font-size: 20px; margin-top: 6px;">--</div>
            <div class="stat-label">睡眠</div>
        </div>
    </div>

    <!-- 快速操作 -->
    <h2 class="section-title">
        <span class="section-dot" style="background: var(--pink);"></span>
        快速打卡
    </h2>

    <div class="quick-actions">
        <button class="action-btn water" onclick="quickWater()">
            <div class="action-icon">💧</div>
            <span class="action-label">喝水</span>
        </button>
        <button class="action-btn pee" onclick="quickPee()">
            <div class="action-icon">🚽</div>
            <span class="action-label">排尿</span>
        </button>
        <button class="action-btn poop" onclick="openPoopModal()">
            <div class="action-icon">💩</div>
            <span class="action-label">排便</span>
        </button>
        <button class="action-btn meal" onclick="openMealModal()">
            <div class="action-icon">🍽️</div>
            <span class="action-label">用餐</span>
        </button>
        <button class="action-btn sport" onclick="openSportModal()">
            <div class="action-icon">🏃</div>
            <span class="action-label">运动</span>
        </button>
        <button class="action-btn sleep" onclick="openSleepModal()">
            <div class="action-icon">🌙</div>
            <span class="action-label">睡眠</span>
        </button>
    </div>

    <!-- 今日记录 -->
    <h2 class="section-title">
        <span class="section-dot" style="background: var(--blue);"></span>
        今日记录
    </h2>

    <div class="logs-container">
        <div id="today-logs">
            <div class="empty-state">
                <div class="empty-icon">📝</div>
                <div>今天还没有记录哦</div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="nav-bar">
        <button class="nav-item active" onclick="switchTab('today')">
            <div class="nav-icon">🏠</div>
            <span class="nav-label">今日</span>
        </button>
        <button class="nav-item" onclick="switchTab('data')">
            <div class="nav-icon">📊</div>
            <span class="nav-label">数据</span>
        </button>
        <button class="nav-item" onclick="switchTab('settings')">
            <div class="nav-icon">⚙️</div>
            <span class="nav-label">设置</span>
        </button>
    </nav>

    <!-- 排便模态框 -->
    <div class="modal-overlay" id="poop-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-icon" style="background: linear-gradient(135deg, var(--orange-light), #FFF3E0);">💩</div>
                <div class="modal-title">排便记录</div>
                <div class="modal-subtitle">今天通畅吗？</div>
            </div>
            <div class="star-rating" id="poop-stars">
                <button class="star-btn" onclick="setPoopStar(1)">⭐</button>
                <button class="star-btn" onclick="setPoopStar(2)">⭐</button>
                <button class="star-btn" onclick="setPoopStar(3)">⭐</button>
                <button class="star-btn" onclick="setPoopStar(4)">⭐</button>
                <button class="star-btn" onclick="setPoopStar(5)">⭐</button>
            </div>
            <div class="input-group">
                <label class="input-label">备注（可选）</label>
                <textarea class="input-field" id="poop-note" placeholder="记录一下..."></textarea>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal('poop-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitPoop()">记录</button>
            </div>
        </div>
    </div>

    <!-- 用餐模态框 -->
    <div class="modal-overlay" id="meal-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-icon" style="background: linear-gradient(135deg, var(--green-light), #E8F5E9);">🍽️</div>
                <div class="modal-title">用餐记录</div>
                <div class="modal-subtitle">吃了什么好吃的？</div>
            </div>
            <div class="meal-options" id="meal-options">
                <div class="meal-option" data-type="breakfast" onclick="selectMeal('breakfast')">
                    <div class="meal-option-icon">🍳</div>
                    <div class="meal-option-label">早餐</div>
                </div>
                <div class="meal-option" data-type="lunch" onclick="selectMeal('lunch')">
                    <div class="meal-option-icon">🍱</div>
                    <div class="meal-option-label">午餐</div>
                </div>
                <div class="meal-option" data-type="dinner" onclick="selectMeal('dinner')">
                    <div class="meal-option-icon">🍲</div>
                    <div class="meal-option-label">晚餐</div>
                </div>
            </div>
            <div class="input-group">
                <label class="input-label">吃了什么</label>
                <input type="text" class="input-field" id="meal-food" placeholder="例如：牛肉面、沙拉...">
            </div>
            <div class="input-group">
                <label class="input-label">时长（分钟）</label>
                <input type="number" class="input-field" id="meal-duration" placeholder="20" value="20">
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal('meal-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitMeal()">记录</button>
            </div>
        </div>
    </div>

    <!-- 运动模态框 -->
    <div class="modal-overlay" id="sport-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-icon" style="background: linear-gradient(135deg, var(--pink-light), #FCE4EC);">🏃</div>
                <div class="modal-title">运动记录</div>
                <div class="modal-subtitle">动起来！</div>
            </div>
            <div class="input-group">
                <label class="input-label">运动类型</label>
                <input type="text" class="input-field" id="sport-type" placeholder="例如：跑步、游泳...">
            </div>
            <div class="input-group">
                <label class="input-label">时长（分钟）</label>
                <input type="number" class="input-field" id="sport-duration" placeholder="30" value="30">
            </div>
            <div class="input-group">
                <label class="input-label">强度</label>
                <div class="star-rating" id="sport-stars">
                    <button class="star-btn" onclick="setSportStar(1)">💪</button>
                    <button class="star-btn" onclick="setSportStar(2)">💪</button>
                    <button class="star-btn" onclick="setSportStar(3)">💪</button>
                    <button class="star-btn" onclick="setSportStar(4)">💪</button>
                    <button class="star-btn" onclick="setSportStar(5)">💪</button>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal('sport-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitSport()">记录</button>
            </div>
        </div>
    </div>

    <!-- 睡眠模态框 -->
    <div class="modal-overlay" id="sleep-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-icon" style="background: linear-gradient(135deg, var(--purple-light), #F3E5F5);">🌙</div>
                <div class="modal-title">睡眠记录</div>
                <div class="modal-subtitle">好好休息~</div>
            </div>
            <div class="input-group">
                <label class="input-label">起床时间</label>
                <input type="time" class="input-field" id="wake-time">
            </div>
            <div class="input-group">
                <label class="input-label">入睡时间</label>
                <input type="time" class="input-field" id="bed-time">
            </div>
            <div class="input-group">
                <label class="input-label">睡眠质量</label>
                <div class="star-rating" id="sleep-stars">
                    <button class="star-btn" onclick="setSleepStar(1)">⭐</button>
                    <button class="star-btn" onclick="setSleepStar(2)">⭐</button>
                    <button class="star-btn" onclick="setSleepStar(3)">⭐</button>
                    <button class="star-btn" onclick="setSleepStar(4)">⭐</button>
                    <button class="star-btn" onclick="setSleepStar(5)">⭐</button>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal('sleep-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitSleep()">记录</button>
            </div>
        </div>
    </div>

    <!-- 提示 -->
