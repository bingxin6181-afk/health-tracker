<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康追踪 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .big-btn { min-height: 70px; font-size: 16px; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .card { border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .tab-inactive { border-bottom: 3px solid transparent; color: #6b7280; }
    </style>
</head>
<body class="bg-gray-50 pb-24">
    
    <!-- 顶部 -->
    <div class="sticky top-0 z-50 glass border-b px-4 py-3 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800">🎯 健康追踪 Pro</h1>
        <span id="current-date" class="text-sm text-gray-600"></span>
    </div>

    <!-- Tab切换 -->
    <div class="sticky top-[57px] z-40 bg-white border-b flex">
        <button onclick="switchTab('today')" id="tab-today" class="flex-1 py-3 text-center tab-active">今日打卡</button>
        <button onclick="switchTab('data')" id="tab-data" class="flex-1 py-3 text-center tab-inactive">📊 数据看板</button>
    </div>

    <!-- ========== 今日打卡页面 ========== -->
    <div id="page-today" class="block">
        <!-- 今日概览 -->
        <div class="p-4 grid grid-cols-2 gap-3">
            <div class="card bg-blue-500 p-4 text-white">
                <div class="text-3xl font-bold" id="water-count">0</div>
                <div class="text-sm opacity-90">💧 喝水 (杯)</div>
            </div>
            <div class="card bg-amber-600 p-4 text-white">
                <div class="text-3xl font-bold" id="poop-count">0</div>
                <div class="text-sm opacity-90">💩 排便 (次)</div>
            </div>
            <div class="card bg-cyan-500 p-4 text-white">
                <div class="text-3xl font-bold" id="pee-count">0</div>
                <div class="text-sm opacity-90">🚽 排尿 (次)</div>
            </div>
            <div class="card bg-indigo-600 p-4 text-white">
                <div class="text-xl font-bold" id="sleep-info">--</div>
                <div class="text-sm opacity-90">😴 睡眠</div>
            </div>
        </div>

        <!-- 睡眠管理区 -->
        <div class="px-4 mb-6">
            <h2 class="text-lg font-bold mb-3 text-gray-800">🌙 睡眠管理</h2>
            <div class="bg-white card p-4">
                <div class="mb-4 pb-4 border-b">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-semibold text-gray-700">今日计划</span>
                        <button onclick="openSleepPlanModal()" class="text-sm text-indigo-600 font-medium">设置计划</button>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">起床: <span id="plan-wake" class="text-gray-800 font-medium">--:--</span></span>
                        <span class="text-gray-500">入睡: <span id="plan-bed" class="text-gray-800 font-medium">--:--</span></span>
                    </div>
                    <!-- 这里添加睡眠记录显示区域 -->
                    <div id="sleep-records" class="mt-3 text-sm text-gray-600 space-y-1"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <button onclick="openWakeModal()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 py-3 rounded-xl font-medium transition">
                        ⏰ 起床打卡
                    </button>
                    <button onclick="openBedModal()" class="bg-purple-100 hover:bg-purple-200 text-purple-700 py-3 rounded-xl font-medium transition">
                        🌙 入睡打卡
                    </button>
                </div>
                
                <button onclick="openSleepQualityModal()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-3 rounded-xl font-medium transition">
                    📊 昨晚睡眠质量评估
                </button>
            </div>
        </div>

        <!-- 快速记录区 -->
        <div class="px-4 mb-6">
            <h2 class="text-lg font-bold mb-3 text-gray-800">⚡ 快速记录</h2>
            
            <div class="grid grid-cols-3 gap-2 mb-3">
                <div>
                    <button onclick="quickWater()" class="big-btn w-full bg-blue-500 hover:bg-blue-600 text-white rounded-xl shadow flex flex-col items-center justify-center gap-1">
                        <span class="text-xl">💧</span>
                        <span class="text-xs">喝水</span>
                    </button>
                    <button onclick="undoWater()" class="w-full mt-1 py-1 bg-blue-100 text-blue-600 rounded-lg text-xs">↩️ 撤销</button>
                </div>
                <div>
                    <button onclick="quickPee()" class="big-btn w-full bg-cyan-500 hover:bg-cyan-600 text-white rounded-xl shadow flex flex-col items-center justify-center gap-1">
                        <span class="text-xl">🚽</span>
                        <span class="text-xs">排尿</span>
                    </button>
                    <button onclick="setReminder()" class="w-full mt-1 py-1 bg-cyan-100 text-cyan-600 rounded-lg text-xs">⏰ 提醒</button>
                </div>
                <div>
                    <button onclick="openPoopModal()" class="big-btn w-full bg-amber-600 hover:bg-amber-700 text-white rounded-xl shadow flex flex-col items-center justify-center gap-1">
                        <span class="text-xl">💩</span>
                        <span class="text-xs">排便</span>
                    </button>
                    <button onclick="undoPoop()" class="w-full mt-1 py-1 bg-amber-100 text-amber-600 rounded-lg text-xs">↩️ 撤销</button>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-3">
                <button onclick="openMealModal('breakfast')" class="big-btn bg-orange-400 hover:bg-orange-500 text-white rounded-xl shadow flex flex-col items-center justify-center gap-1">
                    <span class="text-xl">🍳</span>
                    <span class="text-xs">早餐</span>
                </button>
                <button onclick="openMealModal('lunch')" class="big-btn bg-red-500 hover:bg-red-600 text-white rounded-xl shadow flex flex-col items-center justify-center gap-1">
                    <span class="text-xl">🍱</span>
                    <span class="text-xs">午餐</span>
                </button>
                <button onclick="openMealModal('dinner')" class="big-btn bg-purple-500 hover:bg-purple-600 text-white rounded-xl shadow flex flex-col items-center justify-center gap-1">
                    <span class="text-xl">🍽️</span>
                    <span class="text-xs">晚餐</span>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-3">
                <button onclick="openSportModal()" class="big-btn bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl shadow flex flex-col items-center justify-center gap-1">
                    <span class="text-xl">🏃</span>
                    <span>运动记录</span>
                </button>
                <button onclick="openVoiceModal()" class="big-btn bg-pink-500 hover:bg-pink-600 text-white rounded-xl shadow flex flex-col items-center justify-center gap-1">
                    <span class="text-xl">🎤</span>
                    <span>练嗓打卡</span>
                </button>
            </div>

            <button onclick="openCustomModal()" class="w-full py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-xl font-medium flex items-center justify-center gap-2">
                <span>➕</span> 自定义模块
            </button>
        </div>

        <!-- 今日详细记录 -->
        <div class="px-4 mb-6">
            <h2 class="text-lg font-bold mb-3 text-gray-800">📝 今日详情</h2>
            <div id="today-logs" class="space-y-2"></div>
        </div>
    </div>

    <!-- ========== 数据看板页面 ========== -->
    <div id="page-data" class="hidden px-4 py-4">
        <!-- 关键指标 -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="card bg-gradient-to-br from-blue-500 to-blue-600 p-4 text-white">
                <div class="text-xs opacity-80 mb-1">本周平均喝水</div>
                <div class="text-2xl font-bold" id="avg-water">-- 杯</div>
                <div class="text-xs mt-1" id="total-water">总计: -- 杯</div>
            </div>
            <div class="card bg-gradient-to-br from-indigo-500 to-indigo-600 p-4 text-white">
                <div class="text-xs opacity-80 mb-1">本周平均睡眠</div>
                <div class="text-2xl font-bold" id="avg-sleep">-- 小时</div>
                <div class="text-xs mt-1" id="total-sleep">总计: -- 小时</div>
            </div>
            <div class="card bg-gradient-to-br from-emerald-500 to-emerald-600 p-4 text-white">
                <div class="text-xs opacity-80 mb-1">本周运动</div>
                <div class="text-2xl font-bold" id="total-sport">-- 分钟</div>
                <div class="text-xs mt-1" id="sport-times">-- 次</div>
            </div>
            <div class="card bg-gradient-to-br from-orange-500 to-orange-600 p-4 text-white">
                <div class="text-xs opacity-80 mb-1">本周排便</div>
                <div class="text-2xl font-bold" id="total-poop">-- 次</div>
                <div class="text-xs mt-1" id="poop-avg">平均顺畅度: --</div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="bg-white card p-4 mb-6">
            <h3 class="font-bold text-gray-800 mb-4">📈 7天趋势</h3>
            <canvas id="trendChart" height="200"></canvas>
        </div>

        <div class="bg-white card p-4 mb-6">
            <h3 class="font-bold text-gray-800 mb-4">🥗 饮食分析</h3>
            <div class="grid grid-cols-3 gap-2 text-center mb-3">
                <div class="bg-orange-50 p-3 rounded-lg">
                    <div class="text-xl font-bold text-orange-600" id="meal-breakfast">0</div>
                    <div class="text-xs text-gray-600">早餐</div>
                </div>
                <div class="bg-red-50 p-3 rounded-lg">
                    <div class="text-xl font-bold text-red-600" id="meal-lunch">0</div>
                    <div class="text-xs text-gray-600">午餐</div>
                </div>
                <div class="bg-purple-50 p-3 rounded-lg">
                    <div class="text-xl font-bold text-purple-600" id="meal-dinner">0</div>
                    <div class="text-xs text-gray-600">晚餐</div>
                </div>
            </div>
            <div class="text-sm text-gray-600 text-center">
                平均用餐时长: <span id="avg-meal-time" class="font-bold">--</span> 分钟
            </div>
        </div>

        <!-- 历史记录列表 -->
        <div class="bg-white card p-4 mb-6">
            <h3 class="font-bold text-gray-800 mb-4">📋 历史记录</h3>
            <div id="history-list" class="space-y-3 max-h-[400px] overflow-y-auto"></div>
        </div>
    </div>

    <!-- 各类模态框（保持之前的） -->
    <!-- 排便模态框 -->
    <div id="poop-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6">
            <h3 class="text-lg font-bold mb-4">排便顺畅度</h3>
            <div class="flex justify-center gap-3 mb-6">
                <button onclick="setPoopStar(1)" class="poop-star text-3xl text-gray-300 hover:text-amber-500 transition">⭐</button>
                <button onclick="setPoopStar(2)" class="poop-star text-3xl text-gray-300 hover:text-amber-500 transition">⭐</button>
                <button onclick="setPoopStar(3)" class="poop-star text-3xl text-gray-300 hover:text-amber-500 transition">⭐</button>
                <button onclick="setPoopStar(4)" class="poop-star text-3xl text-gray-300 hover:text-amber-500 transition">⭐</button>
                <button onclick="setPoopStar(5)" class="poop-star text-3xl text-gray-300 hover:text-amber-500 transition">⭐</button>
            </div>
            <input type="text" id="poop-note" placeholder="备注（可选）" class="w-full border rounded-lg p-3 mb-4">
            <div class="flex gap-3">
                <button onclick="closeModal('poop-modal')" class="flex-1 bg-gray-200 py-3 rounded-xl font-medium">取消</button>
                <button onclick="submitPoop()" class="flex-1 bg-amber-600 text-white py-3 rounded-xl font-medium">记录</button>
            </div>
        </div>
    </div>

    <!-- 起床打卡 -->
    <div id="wake-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6">
            <h3 class="text-lg font-bold mb-4">⏰ 起床打卡</h3>
            <input type="time" id="actual-wake-time" class="w-full border rounded-lg p-3 mb-3">
            <div class="flex gap-3">
                <button onclick="closeModal('wake-modal')" class="flex-1 bg-gray-200 py-3 rounded-xl">取消</button>
                <button onclick="submitWake()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl">确认</button>
            </div>
        </div>
    </div>

    <!-- 入睡打卡 -->
    <div id="bed-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6">
            <h3 class="text-lg font-bold mb-4">🌙 入睡打卡</h3>
            <input type="time" id="actual-bed-time" class="w-full border rounded-lg p-3 mb-3">
            <button onclick="closeModal('bed-modal')" class="w-full bg-gray-200 py-3 rounded-xl mb-2">取消</button>
            <button onclick="submitBed()" class="w-full bg-purple-600 text-white py-3 rounded-xl">确认</button>
        </div>
    </div>

    <!-- 睡眠质量 -->
    <div id="sleep-quality-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6">
            <h3 class="text-lg font-bold mb-4">📊 昨晚睡眠质量</h3>
            <div class="flex justify-center gap-3 mb-4">
                <button onclick="setSleepQuality(1)" class="quality-star text-3xl text-gray-300">⭐</button>
                <button onclick="setSleepQuality(2)" class="quality-star text-3xl text-gray-300">⭐</button>
                <button onclick="setSleepQuality(3)" class="quality-star text-3xl text-gray-300">⭐</button>
                <button onclick="setSleepQuality(4)" class="quality-star text-3xl text-gray-300">⭐</button>
                <button onclick="setSleepQuality(5)" class="quality-star text-3xl text-gray-300">⭐</button>
            </div>
            <button onclick="closeModal('sleep-quality-modal')" class="w-full bg-gray-200 py-3 rounded-xl mb-2">取消</button>
            <button onclick="submitSleepQuality()" class="w-full bg-indigo-600 text-white py-3 rounded-xl">保存</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
